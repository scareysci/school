<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Timetable Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style id="dynamic-print-style"></style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 print:bg-white print:h-auto overflow-hidden print:overflow-visible">

    <div id="app" class="flex h-screen print:h-auto print:block">
        <div id="sidebar-container" class="w-64 bg-white border-r flex flex-col shadow-sm z-40 flex-shrink-0 print:hidden"></div>
        <div id="main-container" class="flex-1 flex flex-col overflow-hidden bg-gray-100 print:bg-white print:overflow-visible print:block"></div>
    </div>

    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 z-[100] hidden flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-xl w-[400px] flex flex-col">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-lg">
                <h2 class="text-lg font-bold text-gray-700"><i class="fa-solid fa-building-columns text-indigo-600 mr-2"></i>School Details</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-6 space-y-5">
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-500 font-bold mb-1.5">School Name</label>
                    <input id="setting-school-name" type="text" placeholder="e.g., Rosetown Central High" class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-gray-700 font-medium">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-500 font-bold mb-1.5">Academic Year</label>
                    <input id="setting-school-year" type="text" placeholder="e.g., 2025-2026" class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-gray-700 font-medium">
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 rounded-b-lg flex justify-end">
                <button onclick="saveSettings()" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 font-medium shadow-sm transition-colors">Save & Apply</button>
            </div>
        </div>
    </div>

    <script>
        // --- THEME ENGINE ---
        const colorThemes = {
            gray: 'bg-gray-200 text-gray-700',
            blue: 'bg-blue-100 text-blue-800',
            green: 'bg-green-100 text-green-800',
            purple: 'bg-purple-100 text-purple-800',
            red: 'bg-red-100 text-red-800',
            orange: 'bg-orange-100 text-orange-800',
            yellow: 'bg-yellow-100 text-yellow-800',
            teal: 'bg-teal-100 text-teal-800',
            pink: 'bg-pink-100 text-pink-800',
            indigo: 'bg-indigo-100 text-indigo-800'
        };

        // --- DATA & STATE ---
        const generateEmptyGrid = () => Array(6).fill(null).map(() => Array(6).fill({text: '', color: 'default'}));

        // Data Upgrade Engine: Converts old string arrays into the new rich {text, color} objects
        function upgradeData(data) {
            data.forEach(t => {
                for(let p=0; p<6; p++) {
                    for(let d=0; d<6; d++) {
                        let val = t.schedule[p][d];
                        if (val === null || typeof val === 'string') {
                            let text = (val || '').trim();
                            let color = 'default';
                            let v = text.toUpperCase();
                            
                            // Preserve historical colors on upgrade
                            if (v.includes('PREP')) color = 'gray';
                            else if (v.includes('ADMIN')) color = 'blue';
                            else if (v.includes('PHYS ED') || v.includes('GYM')) color = 'green';
                            else if (v.includes('SCIENCE') || v.includes('BIO')) color = 'purple';
                            else if (v.includes('MATH')) color = 'red';
                            else if (v.includes('STEAM') || v.includes('PAA')) color = 'orange';
                            else if (v.includes('BAND') || v.includes('MUSIC')) color = 'yellow';
                            
                            t.schedule[p][d] = { text: text, color: color };
                        }
                    }
                }
            });
            return data;
        }

        const initialTeachersRaw = [
          { id: '1', name: 'CAREY', schedule: [['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ENVRIO 20/BIO 30', 'ADMIN'], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN'], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN'], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN'], ['ENVRIO 20/BIO 30', 'ENVRIO 20/BIO 30', 'ENVRIO 20/BIO 30', 'ENVRIO 20/BIO 30', 'ENVRIO 20/BIO 30', 'ENVRIO 20/BIO 30'], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN']] },
          { id: '2', name: 'HOULT', schedule: [['MATH 30', 'PREP', 'MATH 20', 'PREP', 'PREP', 'MATH 20'], ['MATH 20', 'MATH 30', 'MATH 30', 'MATH 20', 'MATH 20', 'MATH 20'], ['MATH 30', 'MATH 20', 'MATH 20/30', 'MATH 30', 'MATH 30', 'MATH 30'], ['CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP'], ['CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP'], ['CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP']] },
          { id: '3', name: 'HAYES M', schedule: [['ENGLISH 20/FIN LIT 10', 'PREP', 'ENGLISH 30', 'PREP', 'PHYS ED 7/8', 'ENGLISH 30'], ['ENGLISH 30', 'ENGLISH 20/FIN LIT 10', 'ENGLISH 20/FIN LIT 10', 'ENGLISH 30', 'ENGLISH 30', 'ENGLISH 30'], ['ENGLISH 20/FIN LIT 10', 'ENGLISH 30', 'ENGLISH 9/10', 'ENGLISH 20/FIN LIT 10', 'ENGLISH 20/FIN LIT 10', 'ENGLISH 20/FIN LIT 10'], ['SOCIAL 5/6', 'ENGLISH 9/10', 'SOCIAL 5/6', 'PREP', 'SOCIAL 5/6', 'ENGLISH 9/10'], ['PHYS ED 1/2', 'PHYS ED 7/8', 'PHYS ED 1/2', 'PHYS ED 7/8', 'PHYS ED 1/2', 'PHYS ED 7/8'], ['ENGLISH 9/10', 'ENGLISH 9/10', 'HEALTH 7/8', 'ENGLISH 9/10', 'ENGLISH 9/10', 'HEALTH 7/8']] },
          { id: '4', name: 'HAYES C', schedule: [['PREP', 'SCIENCE 7/8', 'PREP', 'PHYS ED 9/10', 'SCIENCE 10/9', 'PREP'], ['SCIENCE 5/6', 'PHYS ED 5/6', 'SCIENCE 5/6', 'SCIENCE 5/6', 'PHYS ED 5/6', 'SCIENCE 5/6'], ['PAA 7-9', 'PHYS ED 9/10', 'ATH. DIR.', 'PHYS ED 5/6', 'PAA 7-9', 'PHYS ED 5/6'], ['PAA 10/20/30', 'SCIENCE 7/8', 'PAA 10/20/30', 'STEAM 7/8/9', 'PAA 10/20/30', 'SCIENCE 7/8'], ['SCIENCE 10/9', 'SCIENCE 10/9', 'SCIENCE 10/9', 'SCIENCE 10/9', 'SCIENCE 10/9', 'SCIENCE 10/9'], ['PHYS ED 20/30', 'PHYS ED 20/30', 'PHYS ED 9/10', 'PHYS ED 20/30', 'SCIENCE 7/8', 'PHYS ED 9/10']] },
          { id: '5', name: 'WILGOSH', schedule: [['STEAM DEV', 'HISTORY 20/30', 'MATH 7/8', 'HISTORY 20/30', 'SOCIAL9/HIST 10', 'ENGLISH 7/8'], ['MATH 7/8', 'MATH 7/8', 'PREP', 'MATH 7/8', 'MATH 7/8', 'MATH 7/8'], ['PREP', 'ENGLISH 7/8', 'ENGLISH 7/8', 'ENGLISH 7/8', 'PREP', 'SOCIAL 7/8'], ['ENGLISH 7/8', 'HISTORY 20/30', 'ENGLISH 7/8', 'STEAM 7/8/9', 'ENGLISH 7/8', 'HISTORY 20/30'], ['SOCIAL 9/HIST 10', 'SOCIAL 9/HIST 10', 'SOCIAL 9/HIST 10', 'SOCIAL 9/HIST 10', 'SOCIAL 9/HIST 10', 'SOCIAL 9/HIST 10'], ['SOCIAL 7/8', 'SOCIAL 7/8', 'HISTORY 20/30', 'SOCIAL 7/8', 'HISTORY 20/30', 'HISTORY 20/30']] },

          { id: '7', name: 'BREDY', schedule: [['ENGLISH 5/6', 'ENGLISH 5/6', 'ENGLISH 5/6', 'ENGLISH 5/6', 'ENGLISH 5/6', 'ENGLISH 5/6'], ['STRUCT LIT 3/4', 'STRUCT LIT 3/4', 'STRUCT LIT 3/4', 'STRUCT LIT 3/4', 'STRUCT LIT 3/4', 'STRUCT LIT 3/4'], ['PAA 7-9', 'HEALTH 5/6', 'PREP', 'PREP', 'PAA 7-9', 'PREP'], ['PAA 10/20/30', 'ENGLISH 5/6', 'PAA 10/20/30', 'ENGLISH 5/6', 'PAA 10/20/30', 'ENGLISH 5/6'], ['MATH 5/6', 'MATH 5/6', 'MATH 5/6', 'MATH 5/6', 'MATH 5/6', 'MATH 5/6'], ['ENGLISH 5/6', 'ARTS ED 5/6', 'ENGLISH 5/6', 'ARTS ED 5/6', 'HEALTH 5/6', 'MATH 5/6']] },
          { id: '8', name: 'JEFFERY', schedule: [['MATH 3/4', 'MATH 3/4', 'MATH 3/4', 'MATH 3/4', 'MATH 3/4', 'MATH 3/4'], ['ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4'], ['PHYS ED 3/4', 'SCIENCE 3/4', 'PHYS ED 3/4', 'SCIENCE 3/4', 'PHYS ED 3/4', 'SCIENCE 3/4'], ['ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4'], ['SOCIAL 3/4', 'SOCIAL 3/4', 'HEALTH 3/4', 'SOCIAL 3/4', 'SOCIAL 3/4', 'HEALTH 3/4'], ['PREP', 'ARTS ED 3/4', 'PREP', 'ARTS ED 3/4', 'PREP', 'MATH 3/4']] },
          { id: '9', name: 'TBD', schedule: [['MATH 1/2', 'MATH 1/2', 'MATH 1/2', 'MATH 1/2', 'MATH 1/2', 'MATH 1/2'], ['ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2'], ['HEALTH 1/2', 'SOCIAL 1/2', 'SOCIAL 1/2', 'HEALTH 1/2', 'SOCIAL 1/2', 'SOCIAL 1/2'], ['ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2'], ['PREP', 'SCIENCE 1/2', 'PREP', 'SCIENCE 1/2', 'PREP', 'SCIENCE 1/2'], ['ARTS ED 1/2', 'ARTS ED 1/2', 'SCIENCE 1/2', 'ARTS ED 1/2', 'ARTS ED 1/2', 'ENGLISH 1/2']] },
          { id: '10', name: 'HYND', schedule: [['', 'KDGN', '', 'KDGN', '......', 'KDGN'], ['', 'KDGN', '', 'KDGN', '', 'KDGN'], ['', 'KDGN', '', 'KDGN', '', 'KDGN'], ['', '', '', '', '', ''], ['', 'KDGN', '', 'KDGN', '', 'KDGN'], ['', 'KDGN', '', 'KDGN', '', 'KDGN']] },
          { id: '11', name: 'BREWER', schedule: [['', '', '', 'CAREERS 7/8', '......', ''], ['', '', '', 'COUNSELLING', '', ''], ['', '......', '', 'CAREERS 9', '......', ''], ['', '', '', 'CWEX 10/20/30', '', ''], ['', '', '', 'COUNSELLING', '', ''], ['', '', '', 'COUNSELLING', '', '']] },
          { id: '12', name: 'RADIES-OLF', schedule: [['SDLC-GR 10', '', '', '', '', ''], ['', 'SCLC-GR 10S', 'SCLC-GR 10S', '', '', ''], ['SCLC-GR 10S', '', '', 'SCLC-GR 10S', 'SCLC-GR 10S', 'SCLC-GR 10S'], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '13', name: 'GYM PE', schedule: [['', '', '', 'PHYS ED 9/10', 'PHYS ED 7/8', ''], ['', 'PHYS ED 5/6', '', '', 'PHYS ED 5/6', ''], ['PHYS ED 3/4', 'PHYS ED 9/10', 'PHYS ED 3/4', 'PHYS ED 5/6', 'PHYS ED 3/4', 'PHYS ED 5/6'], ['', 'PHYS ED K', '', 'PHYS ED K', '', 'PHYS ED K'], ['PHYS ED 1/2', 'PHYS ED 7/8', 'PHYS ED 1/2', 'PHYS ED 7/8', 'PHYS ED 1/2', 'PHYS ED 7/8'], ['PHYS ED 20/30', 'PHYS ED 20/30', 'PHYS ED 9/10', 'PHYS ED 20/30', '', 'PHYS ED 9/10']] },
          { id: '14', name: 'KING', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN'], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '15', name: 'PALASCHAK', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', 'PHYS ED K', '', 'PHYS ED K', '', 'PHYS ED K'], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '16', name: 'LIBRARY', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '17', name: 'GREEN', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '18', name: 'LAROCK', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '19', name: 'NUNWEILER', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', '']] }
        ];

        // Load & Upgrade
        let loadedData = JSON.parse(localStorage.getItem('masterTimetableData')) || initialTeachersRaw;
        let teachers = upgradeData(loadedData);

        let appSettings = JSON.parse(localStorage.getItem('masterTimetableSettings')) || {
            schoolName: 'Your School Name',
            schoolYear: '2025-2026'
        };

        let selectedId = teachers[0].id;
        let viewMode = 'single'; // 'single' or 'master'
        let masterViewType = 'by-period'; // 'by-period' or 'by-teacher'

        function getTeacher() {
            return teachers.find(t => t.id === selectedId) || teachers[0];
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // --- STYLING LOGIC ---
        function getCellStyles(cellObj) {
            if (!cellObj || !cellObj.text || cellObj.text.toUpperCase() === 'FREE') return 'bg-white text-gray-300 italic';
            if (cellObj.text.includes('......')) return 'bg-gray-50 text-gray-400';
            
            if (cellObj.color && colorThemes[cellObj.color]) {
                return colorThemes[cellObj.color];
            }
            return 'bg-white text-gray-800'; // fallback
        }

        // --- ACTIONS & SETTINGS ---
        function saveData() {
            localStorage.setItem('masterTimetableData', JSON.stringify(teachers));
            localStorage.setItem('masterTimetableSettings', JSON.stringify(appSettings));
        }

        window.openSettings = function() {
            document.getElementById('setting-school-name').value = appSettings.schoolName || '';
            document.getElementById('setting-school-year').value = appSettings.schoolYear || '';
            document.getElementById('settings-modal').classList.remove('hidden');
        };

        window.closeSettings = function() {
            document.getElementById('settings-modal').classList.add('hidden');
        };

        window.saveSettings = function() {
            appSettings.schoolName = document.getElementById('setting-school-name').value;
            appSettings.schoolYear = document.getElementById('setting-school-year').value;
            saveData();
            closeSettings();
            renderApp();
        };

        // --- UNDO ENGINE ---
        let undoStack = [];
        const MAX_HISTORY = 10;

        function saveStateToHistory() {
            undoStack.push(JSON.stringify(teachers));
            if (undoStack.length > MAX_HISTORY) {
                undoStack.shift();
            }
        }

        window.undo = function() {
            if (undoStack.length > 0) {
                const previousState = undoStack.pop();
                teachers = JSON.parse(previousState);
                saveData();
                renderApp();
            }
        };

        // --- DRAG AND DROP LOGIC ---
        let dragSource = null;

        window.handleDragStart = function(e, tId, p, d) {
            // Check if we are currently editing. If so, don't allow drag
            if (e.currentTarget.querySelector('input')) {
                e.preventDefault();
                return;
            }
            dragSource = { tId, p, d };
            e.dataTransfer.effectAllowed = 'copy';
            e.dataTransfer.setData('text/plain', 'timetable-cell');
            e.target.style.opacity = '0.4'; 
        };

        window.handleDragEnd = function(e) {
            e.target.style.opacity = '1';
            dragSource = null;
        };

        window.handleDragOver = function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            return false;
        };

        window.handleDragEnter = function(e) {
            e.currentTarget.classList.add('ring-4', 'ring-indigo-400', 'scale-105', 'z-10');
        };

        window.handleDragLeave = function(e) {
            e.currentTarget.classList.remove('ring-4', 'ring-indigo-400', 'scale-105', 'z-10');
        };

        window.handleDrop = function(e, targetTId, targetP, targetD) {
            e.stopPropagation();
            e.currentTarget.classList.remove('ring-4', 'ring-indigo-400', 'scale-105', 'z-10');
            
            if (dragSource) {
                const sourceTeacher = teachers.find(t => t.id === dragSource.tId);
                const targetTeacher = teachers.find(t => t.id === targetTId);
                
                if (sourceTeacher && targetTeacher) {
                    const valToCopy = sourceTeacher.schedule[dragSource.p][dragSource.d];
                    const targetCell = targetTeacher.schedule[targetP][targetD];
                    
                    const sourceText = typeof valToCopy === 'string' ? valToCopy : valToCopy.text;
                    const sourceColor = typeof valToCopy === 'string' ? 'default' : valToCopy.color;
                    
                    const targetText = typeof targetCell === 'string' ? targetCell : targetCell.text;
                    const targetColor = typeof targetCell === 'string' ? 'default' : targetCell.color;
                    
                    if (targetText !== sourceText || targetColor !== sourceColor) {
                        saveStateToHistory(); 
                        targetTeacher.schedule[targetP][targetD] = { 
                            text: sourceText, 
                            color: sourceColor 
                        };
                        saveData();
                        renderApp();
                    }
                }
            }
            return false;
        };

        window.switchView = function(mode) {
            viewMode = mode;
            renderApp();
        };

        window.toggleMasterView = function(type) {
            masterViewType = type;
            renderApp();
        };

        window.selectTeacher = function(id) {
            selectedId = id;
            viewMode = 'single';
            renderApp();
        };

        window.addTeacher = function() {
            saveStateToHistory();
            const newId = Date.now().toString();
            teachers.push({ id: newId, name: 'NEW TEACHER', schedule: generateEmptyGrid() });
            selectedId = newId;
            viewMode = 'single';
            saveData();
            renderApp();
        };

        window.deleteTeacher = function() {
            if (teachers.length === 1) return alert("Cannot delete the last teacher.");
            if (confirm(`Are you sure you want to delete ${getTeacher().name}?`)) {
                saveStateToHistory();
                teachers = teachers.filter(t => t.id !== selectedId);
                selectedId = teachers[0].id;
                saveData();
                renderApp();
            }
        };

        window.exportData = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(teachers, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `MasterTimetable_${appSettings.schoolYear}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        window.triggerImport = function() {
            document.getElementById('fileImport').click();
        };

        window.handleImport = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        saveStateToHistory();
                        teachers = upgradeData(importedData); // upgrades old strings to objects if necessary
                        selectedId = teachers[0]?.id || '';
                        saveData();
                        renderApp();
                    } else {
                        alert('Invalid file format. Please upload a valid backup JSON file.');
                    }
                } catch (err) {
                    alert('Error reading file. Please make sure it is a valid JSON backup.');
                }
                event.target.value = null; 
            };
            reader.readAsText(file);
        };

        // --- INLINE EDITING LOGIC WITH COLOR PICKER ---
        window.startEdit = function(element, tId, p, d, isCompact) {
            if (element.querySelector('input')) return; 
            
            const teacher = teachers.find(t => t.id === tId);
            const cellData = teacher.schedule[p][d];
            
            // Ensure cell is relative for the absolute popover to anchor correctly
            element.classList.add('relative');

            const popover = document.createElement('div');
            // Popover floats over the grid to ensure it isn't clipped by tiny master cells
            popover.className = `absolute top-0 left-0 z-50 flex flex-col bg-white border-2 border-indigo-500 rounded shadow-2xl ${isCompact ? 'min-w-[150px]' : 'min-w-[100%]'}`;
            
            // Generate Swatches
            let swatchesHtml = Object.keys(colorThemes).map(c => `
                <div onclick="applyInlineEdit('${tId}', ${p}, ${d}, '${c}')" class="w-5 h-5 rounded cursor-pointer hover:scale-110 ${colorThemes[c].split(' ')[0]} border border-gray-300" title="${c}"></div>
            `).join('');
            
            // Clear Color Button
            swatchesHtml += `<div onclick="applyInlineEdit('${tId}', ${p}, ${d}, 'default')" class="w-5 h-5 rounded cursor-pointer hover:scale-110 bg-white border border-gray-300 flex items-center justify-center text-[10px] font-bold text-gray-500" title="Clear Color">X</div>`;

            popover.innerHTML = `
                <input id="inline-edit-input" type="text" value="${escapeHtml(cellData.text)}" class="w-full text-center outline-none p-2 text-sm text-gray-800 rounded-t border-b border-indigo-100" placeholder="Class Name...">
                <div class="flex flex-wrap justify-center gap-1.5 p-2 bg-indigo-50 rounded-b" onmousedown="event.preventDefault()">
                    ${swatchesHtml}
                </div>
            `;

            element.innerHTML = '';
            element.appendChild(popover);
            
            const input = document.getElementById('inline-edit-input');
            input.focus();
            input.select(); 
            
            input.onblur = () => applyInlineEdit(tId, p, d, cellData.color);
            input.onkeydown = (e) => { if(e.key === 'Enter') input.blur(); };
        };

        window.applyInlineEdit = function(tId, p, d, colorKey) {
            const input = document.getElementById('inline-edit-input');
            if (!input) return; // Prevent double firing
            
            const newVal = input.value.toUpperCase();
            const teacher = teachers.find(t => t.id === tId);
            
            if (teacher.schedule[p][d].text !== newVal || teacher.schedule[p][d].color !== colorKey) {
                saveStateToHistory();
                teacher.schedule[p][d] = { text: newVal, color: colorKey };
                saveData();
            }
            renderApp();
        };


        // --- RENDERING VIEWS ---
        function getSidebarHtml() {
            let listHtml = teachers.map(t => {
                const isSelected = (selectedId === t.id && viewMode === 'single');
                const classes = isSelected 
                    ? 'bg-indigo-50 border-indigo-200 text-indigo-800 font-semibold shadow-sm' 
                    : 'bg-white border-transparent hover:bg-gray-100 text-gray-600';

        function getSummaryHtml(teacher) {
            const counts = {};
            teacher.schedule.flat().forEach(val => {
                const cleanVal = (val.text || '').trim();

                    counts[cleanVal] = (counts[cleanVal] || 0) + 1;
                }
            });
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            
            if (sorted.length === 0) return '';

            let html = `
                <div class="max-w-7xl mx-auto mt-8 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden print:mt-6 print:shadow-none print:border-gray-300 print:border">

                    <div class="p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 print:p-4 print:gap-2">
            `;
            
            sorted.forEach(([className, count]) => {
                html += `
                    <div class="flex justify-between items-center bg-gray-50 px-3 py-2 rounded border border-gray-200 print:bg-white print:border-gray-300">

        function updatePrintStyles() {
            let style = document.getElementById('dynamic-print-style');
            style.innerHTML = `
                @media print {
                    @page {
                        size: ${viewMode === 'master' ? 'tabloid landscape' : 'letter portrait'};
                        margin: ${viewMode === 'master' ? '0.25in' : '0.5in'};
                    }
                    body {
                        -webkit-print-color-adjust: exact;
                        print-color-adjust: exact;
                    }
                    th, td {
                        position: static !important;
                    }
                }
            `;
        }

        // --- CORE RENDER ENGINE ---
        function renderApp() {
            document.getElementById('sidebar-container').innerHTML = getSidebarHtml();
            document.getElementById('main-container').innerHTML = getMainHtml();
            updatePrintStyles();

            const nameInput = document.getElementById('teacher-name-input');
            if (nameInput) {
                let nameSnapshot = "";
                nameInput.addEventListener('focus', () => {
                    nameSnapshot = JSON.stringify(teachers);
                });
                nameInput.addEventListener('input', (e) => {
                    getTeacher().name = e.target.value.toUpperCase();
                    document.getElementById('sidebar-container').innerHTML = getSidebarHtml();
                });
                nameInput.addEventListener('blur', () => {
                    if (nameSnapshot && nameSnapshot !== JSON.stringify(teachers)) {
                        undoStack.push(nameSnapshot);
                        if (undoStack.length > MAX_HISTORY) undoStack.shift();
                        saveData();
                        renderApp();
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    if (e.target.tagName === 'INPUT') return; 
                    e.preventDefault();
                    window.undo();
                }
            });
        });

    </script>
</body>
</html>
