<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Timetable Manager</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style id="dynamic-print-style"></style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 print:bg-white print:h-auto overflow-hidden print:overflow-visible">

    <!-- App Container -->
    <div id="app" class="flex h-screen print:h-auto print:block">
        <!-- Sidebar and Main Area will be injected here by Javascript -->
        <div id="sidebar-container" class="w-64 bg-white border-r flex flex-col shadow-sm z-40 flex-shrink-0 print:hidden"></div>
        <div id="main-container" class="flex-1 flex flex-col overflow-hidden bg-gray-100 print:bg-white print:overflow-visible print:block"></div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="fixed inset-0 bg-black bg-opacity-50 z-[100] hidden flex items-center justify-center">

            <div class="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-lg">
                <h2 class="text-lg font-bold text-gray-700"><i class="fa-solid fa-gear text-indigo-600 mr-2"></i>Settings & Cloud</h2>
                <button onclick="closeSettings()" class="text-gray-400 hover:text-red-500 transition-colors"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            <div class="p-6 space-y-5">
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-500 font-bold mb-1.5">School Name</label>
                    <input id="setting-school-name" type="text" placeholder="e.g., Rosetown Central High" class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-gray-700 font-medium">
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-gray-500 font-bold mb-1.5">Academic Year</label>
                    <input id="setting-school-year" type="text" placeholder="e.g., 2025-2026" class="w-full border border-gray-300 rounded p-2.5 outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-gray-700 font-medium">
                </div>
                <div class="pt-4 border-t border-gray-200">
                    <label class="block text-xs uppercase tracking-wider text-green-600 font-bold mb-1.5"><i class="fa-solid fa-cloud mr-1"></i> Cloud Database Connected</label>
                    <p class="text-sm text-gray-600 font-medium bg-green-50 border border-green-200 rounded p-3">
                        <i class="fa-solid fa-check-circle text-green-500 mr-1"></i> This timetable is securely connected to your Firebase database. All changes are saved to the cloud automatically.
                    </p>
                </div>
            </div>
            <div class="p-4 border-t bg-gray-50 rounded-b-lg flex justify-end">
                <button onclick="saveSettings()" class="bg-indigo-600 text-white px-6 py-2 rounded hover:bg-indigo-700 font-medium shadow-sm transition-colors">Save & Apply</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-4 right-4 bg-gray-800 text-white px-6 py-3 rounded shadow-xl transition-all duration-300 opacity-0 transform translate-y-4 pointer-events-none z-[200] font-medium flex items-center gap-3">
        <i id="toast-icon" class="fa-solid fa-check text-green-400"></i>

                            else if (v.includes('ADMIN')) color = 'blue';

                            else if (v.includes('SCIENCE') || v.includes('BIO')) color = 'purple';
                            else if (v.includes('MATH')) color = 'red';
                            else if (v.includes('STEAM') || v.includes('PAA')) color = 'orange';
                            else if (v.includes('BAND') || v.includes('MUSIC')) color = 'yellow';
                            
                            t.schedule[p][d] = { text: text, color: color };
                        }
                    }
                }
            });

          { id: '14', name: 'KING', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN'], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '15', name: 'PALASCHAK', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', 'PHYS ED K', '', 'PHYS ED K', '', 'PHYS ED K'], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '16', name: 'LIBRARY', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '17', name: 'GREEN', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '18', name: 'LAROCK', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '19', name: 'NUNWEILER', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', '']] }
        ];

        let loadedData = JSON.parse(localStorage.getItem('masterTimetableData')) || initialTeachersRaw;
        let teachers = upgradeData(loadedData);

        let appSettings = JSON.parse(localStorage.getItem('masterTimetableSettings')) || {
            schoolName: 'Rosetown Central High',
            schoolYear: '2025-2026'
        };

        let versions = JSON.parse(localStorage.getItem('masterTimetableVersions')) || [];

        let selectedId = teachers[0].id;
        let viewMode = 'single'; 
        let masterViewType = 'by-period'; 
        let isSyncing = false;

        function getTeacher() {
            return teachers.find(t => t.id === selectedId) || teachers[0];
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toast-msg');
            const icon = document.getElementById('toast-icon');
            
            msg.innerText = message;
            if (isError) {
                icon.className = 'fa-solid fa-triangle-exclamation text-red-400';
                toast.classList.add('border-l-4', 'border-red-500');
            } else {
                icon.className = 'fa-solid fa-check text-green-400';
                toast.classList.remove('border-l-4', 'border-red-500');
            }

            toast.classList.remove('opacity-0', 'translate-y-4');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-4');
            }, 3000);
        }

        function getCellStyles(cellObj) {
            if (!cellObj || !cellObj.text || cellObj.text.toUpperCase() === 'FREE') return 'bg-white text-gray-300 italic';
            if (cellObj.text.includes('......')) return 'bg-gray-50 text-gray-400';
            
            if (cellObj.color && colorThemes[cellObj.color]) {
                return colorThemes[cellObj.color];
            }
            return 'bg-white text-gray-800'; 
        }

        let autoSaveTimeout = null;

        function saveData() {
            localStorage.setItem('masterTimetableData', JSON.stringify(teachers));
            localStorage.setItem('masterTimetableSettings', JSON.stringify(appSettings));
            localStorage.setItem('masterTimetableVersions', JSON.stringify(versions));

            // Background auto-save to cloud
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => {
                if (typeof pushToCloud === 'function') pushToCloud(true);
            }, 1500);
        }

        window.openSettings = function() {
            document.getElementById('setting-school-name').value = appSettings.schoolName || '';
            document.getElementById('setting-school-year').value = appSettings.schoolYear || '';
            document.getElementById('settings-modal').classList.remove('hidden');
        };

        window.closeSettings = function() {
            document.getElementById('settings-modal').classList.add('hidden');
        };

        window.saveSettings = function() {
            appSettings.schoolName = document.getElementById('setting-school-name').value;
            appSettings.schoolYear = document.getElementById('setting-school-year').value;
            saveData();
            closeSettings();
            renderApp();
            showToast('Settings saved!');
        };

        // --- CLOUD SYNC ENGINE (FIREBASE) ---
        window.pushToCloud = async function(silent = false) {
            if (isSyncing) return;
            isSyncing = true;

            try {
                // We use a shared document so everyone loads the same file
                const docRef = doc(db, 'timetable', 'main');
                
                // We stringify the arrays to avoid Firebase nested array limitations
                await setDoc(docRef, {
                    teachersStr: JSON.stringify(teachers),
                    settings: appSettings,
                    versionsStr: JSON.stringify(versions),
                    lastUpdated: new Date().toISOString()
                });
                
                if (!silent) showToast('Successfully pushed to Firebase!');
            } catch (err) {
                console.error(err);
                if (!silent) showToast('Connection error. Could not save.', true);
            }

            isSyncing = false;
        };

        window.pullFromCloud = async function(silent = false) {
            if (isSyncing) return;
            isSyncing = true;

            try {
                const docRef = doc(db, 'timetable', 'main');
                const docSnap = await getDoc(docRef);
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    if (!silent) saveStateToHistory(); 
                    
                    if (data.teachersStr) {
                        teachers = upgradeData(JSON.parse(data.teachersStr));
                    }
                    if (data.settings) {
                        appSettings = data.settings;
                    }
                    if (data.versionsStr) {
                        versions = JSON.parse(data.versionsStr);
                    }
                    
                    // Save locally without triggering auto-save back to cloud
                    localStorage.setItem('masterTimetableData', JSON.stringify(teachers));
                    localStorage.setItem('masterTimetableSettings', JSON.stringify(appSettings));
                    localStorage.setItem('masterTimetableVersions', JSON.stringify(versions));
                    
                    if (!silent) showToast('Successfully pulled from Firebase!');
                } else if (!silent) {
                    showToast('No data found in cloud yet.', true);
                }
            } catch (err) {
                console.error(err);
                if (!silent) showToast('Connection error. Could not load.', true);
            }

            isSyncing = false;
            renderApp();
        };

        // --- VERSIONING ENGINE ---
        window.saveVersion = async function() {
            const versionName = prompt("Enter a name for this snapshot (e.g., 'Fall Final'):");
            if (!versionName) return;
            
            const newVersion = {
                id: Date.now().toString(),
                name: versionName,
                timestamp: new Date().toISOString(),
                teachers: JSON.parse(JSON.stringify(teachers)),
                settings: JSON.parse(JSON.stringify(appSettings))
            };
            
            versions.push(newVersion);
            saveData();
            showToast("Snapshot saved!");
            renderApp();
        };

        window.restoreVersion = function(versionId) {
            if (!versionId) return;
            if (!confirm("This will overwrite your current working grid with the selected snapshot. Continue?")) return;
            
            const v = versions.find(v => v.id === versionId);
            if (v) {
                saveStateToHistory();
                teachers = JSON.parse(JSON.stringify(v.teachers));
                if (v.settings) appSettings = JSON.parse(JSON.stringify(v.settings));
                saveData();
                renderApp();
                showToast(`Restored: ${v.name}`);
            }
        };

        window.restoreSelectedVersion = function() {
            const select = document.getElementById('snapshot-select');
            const versionId = select ? select.value : null;
            if (!versionId) return showToast("Please select a snapshot first.", true);
            window.restoreVersion(versionId);
        };

        window.deleteSelectedVersion = function() {
            const select = document.getElementById('snapshot-select');
            const versionId = select ? select.value : null;
            if (!versionId) return showToast("Please select a snapshot first.", true);
            
            const v = versions.find(v => v.id === versionId);
            if (v && confirm(`Are you sure you want to permanently delete snapshot: "${v.name}"?`)) {
                versions = versions.filter(ver => ver.id !== versionId);
                saveData();
                renderApp();
                showToast(`Snapshot deleted.`);
            }
        };

        // --- UNDO ENGINE ---
        let undoStack = [];
        const MAX_HISTORY = 10;

        function saveStateToHistory() {
            undoStack.push(JSON.stringify(teachers));
            if (undoStack.length > MAX_HISTORY) {
                undoStack.shift();
            }
        }

        window.undo = function() {
            if (undoStack.length > 0) {
                const previousState = undoStack.pop();
                teachers = JSON.parse(previousState);
                saveData();
                renderApp();
                showToast('Action undone');
            }
        };

        // --- DRAG AND DROP LOGIC ---
        let dragSource = null;

        window.handleDragStart = function(e, tId, p, d) {
            if (e.currentTarget.querySelector('input')) {
                e.preventDefault();
                return;
            }
            dragSource = { tId, p, d };
            e.dataTransfer.effectAllowed = 'copy';
            e.dataTransfer.setData('text/plain', 'timetable-cell');
            e.target.style.opacity = '0.4'; 
        };

        window.handleDragEnd = function(e) {
            e.target.style.opacity = '1';
            dragSource = null;
        };

        window.handleDragOver = function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
            return false;
        };

        window.handleDragEnter = function(e) {
            e.currentTarget.classList.add('ring-4', 'ring-indigo-400', 'scale-105', 'z-10');
        };

        window.handleDragLeave = function(e) {
            e.currentTarget.classList.remove('ring-4', 'ring-indigo-400', 'scale-105', 'z-10');
        };

        window.handleDrop = function(e, targetTId, targetP, targetD) {
            e.stopPropagation();
            e.currentTarget.classList.remove('ring-4', 'ring-indigo-400', 'scale-105', 'z-10');
            
            if (dragSource) {
                const sourceTeacher = teachers.find(t => t.id === dragSource.tId);
                const targetTeacher = teachers.find(t => t.id === targetTId);
                
                if (sourceTeacher && targetTeacher) {
                    const valToCopy = sourceTeacher.schedule[dragSource.p][dragSource.d];
                    const targetCell = targetTeacher.schedule[targetP][targetD];
                    
                    // Deep copy to ensure both text and color are securely transferred
                    const clonedVal = { 
                        text: valToCopy.text || '', 
                        color: valToCopy.color || 'default' 
                    };
                    
                    const targetText = typeof targetCell === 'string' ? targetCell : targetCell.text;
                    const targetColor = typeof targetCell === 'string' ? 'default' : targetCell.color;
                    
                    if (targetText !== clonedVal.text || targetColor !== clonedVal.color) {
                        saveStateToHistory(); 
                        targetTeacher.schedule[targetP][targetD] = clonedVal;
                        saveData();
                        renderApp();
                    }
                }
            }
            return false;
        };

        window.switchView = function(mode) {
            viewMode = mode;
            renderApp();
        };

        window.toggleMasterView = function(type) {
            masterViewType = type;
            renderApp();
        };

        window.selectTeacher = function(id) {
            selectedId = id;
            viewMode = 'single';
            renderApp();
        };

        window.addTeacher = function() {
            saveStateToHistory();
            const newId = Date.now().toString();
            teachers.push({ id: newId, name: 'NEW TEACHER', schedule: generateEmptyGrid() });
            selectedId = newId;
            viewMode = 'single';
            saveData();
            renderApp();
        };

            if (teachers.length === 1) return alert("Cannot delete the last teacher.");
            if (confirm(`Are you sure you want to delete ${getTeacher().name}?`)) {
                saveStateToHistory();
                teachers = teachers.filter(t => t.id !== selectedId);
                selectedId = teachers[0].id;
                saveData();
                renderApp();
            }
        };

        window.exportData = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(teachers, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", `MasterTimetable_${appSettings.schoolYear}.json`);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        window.triggerImport = function() {
            document.getElementById('fileImport').click();
        };

        window.handleImport = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        saveStateToHistory();
                        teachers = upgradeData(importedData); 
                        selectedId = teachers[0]?.id || '';
                        saveData();
                        renderApp();
                        showToast('Import successful!');
                    } else {
                        alert('Invalid file format. Please upload a valid backup JSON file.');
                    }
                } catch (err) {
                    alert('Error reading file. Please make sure it is a valid JSON backup.');
                }
                event.target.value = null; 
            };
            reader.readAsText(file);
        };

            const cellData = teacher.schedule[p][d];
            
            element.classList.add('relative');

            const popover = document.createElement('div');
            popover.className = `absolute top-0 left-0 z-50 flex flex-col bg-white border-2 border-indigo-500 rounded shadow-2xl ${isCompact ? 'min-w-[150px]' : 'min-w-[100%]'}`;
            
            let swatchesHtml = Object.keys(colorThemes).map(c => `
                <div onclick="applyInlineEdit('${tId}', ${p}, ${d}, '${c}')" class="w-5 h-5 rounded cursor-pointer hover:scale-110 ${colorThemes[c].split(' ')[0]} border border-gray-300" title="${c}"></div>
            `).join('');
            
            swatchesHtml += `<div onclick="applyInlineEdit('${tId}', ${p}, ${d}, 'default')" class="w-5 h-5 rounded cursor-pointer hover:scale-110 bg-white border border-gray-300 flex items-center justify-center text-[10px] font-bold text-gray-500" title="Clear Color">X</div>`;

            popover.innerHTML = `
                <input id="inline-edit-input" type="text" value="${escapeHtml(cellData.text)}" class="w-full text-center outline-none p-2 text-sm text-gray-800 rounded-t border-b border-indigo-100" placeholder="Class Name...">
                <div class="flex flex-wrap justify-center gap-1.5 p-2 bg-indigo-50 rounded-b" onmousedown="event.preventDefault()">
                    ${swatchesHtml}
                </div>
            `;

            element.innerHTML = '';
            element.appendChild(popover);
            
            const input = document.getElementById('inline-edit-input');
            input.focus();
            input.select(); 
            
            input.onblur = () => applyInlineEdit(tId, p, d, cellData.color);
            input.onkeydown = (e) => { if(e.key === 'Enter') input.blur(); };
        };

        window.applyInlineEdit = function(tId, p, d, colorKey) {
            const input = document.getElementById('inline-edit-input');

            if (teacher.schedule[p][d].text !== newVal || teacher.schedule[p][d].color !== colorKey) {
                saveStateToHistory();
                teacher.schedule[p][d] = { text: newVal, color: colorKey };
                saveData();

                            const isLast = rowIndex === teachers.length - 1;
                            html += `<tr class="hover:bg-indigo-50 group">
                                <td class="sticky left-0 z-10 bg-white group-hover:bg-indigo-50 border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] p-1.5 px-2 font-bold text-[10px] text-gray-800 ${!isLast ? 'border-b' : ''}">${escapeHtml(t.name)}</td>`;
                            
                            chunk.forEach(d => {
                                for(let p=0; p<6; p++) {
                                    const cellData = t.schedule[p][d];
                                    const styles = getCellStyles(cellData);
                                    html += `<td class="p-0 align-middle ${!isLast ? 'border-b border-gray-200' : ''} ${p === 5 ? 'border-r-2 border-r-gray-300' : 'border-r border-gray-200'}">
                                        <div draggable="true" ondragstart="handleDragStart(event, '${t.id}', ${p}, ${d})" ondragend="handleDragEnd(event)" ondragover="handleDragOver(event)" ondragenter="handleDragEnter(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${t.id}', ${p}, ${d})" onclick="startEdit(this, '${t.id}', ${p}, ${d}, true)" class="w-full h-full flex items-center justify-center transition-colors cursor-pointer ${styles} p-1 text-[9px] font-medium min-h-[32px] overflow-hidden whitespace-nowrap" title="${cellData.text ? 'Click to edit: '+escapeHtml(cellData.text) : 'Click to add class'}">
                                            <span class="block w-[48px] truncate">${escapeHtml(cellData.text) || ''}</span>
                                        </div>
                                    </td>`;
                                }
                            });
                            html += `</tr>`;
                        });

                        html += `</tbody></table></div>`;
                    });

                    html += `</div>`;
                    return html;

                } else {
                    html += `
                        <div class="flex-1 overflow-auto bg-gray-200 p-4 print:p-0 print:bg-white print:overflow-visible">
                    `;
                    
                    [0,1,2,3,4,5].forEach((d, index) => {
                        const pageBreak = index > 0 ? 'page-break-before: always; break-before: page;' : '';
                        html += `
                            <div class="bg-white border border-gray-300 shadow-sm mb-8 print:border-none print:shadow-none print:mb-0 ${index > 0 ? 'print-page-break' : ''} w-max min-w-full print:w-full">
                                <div class="px-4 py-3 border-b bg-gray-50 flex items-center justify-between print:hidden">
                                    <h2 class="font-bold text-gray-700">Day ${d+1}</h2>
                                </div>
                                <div class="hidden print:block mb-4">
                                    <h1 class="text-2xl font-extrabold text-gray-800 uppercase tracking-tight">Master Grid (Day ${d+1})</h1>
                                    <p class="text-sm text-gray-500">${escapeHtml(appSettings.schoolName)} | ${escapeHtml(appSettings.schoolYear)}</p>
                                </div>
                                <table class="border-collapse min-w-full table-fixed">
                                    <thead>
                                        <tr>
                                            <th class="h-8 sticky top-0 left-0 z-30 bg-gray-50 border-b-2 border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] p-1 text-[10px] text-center px-1 font-bold text-gray-600 uppercase tracking-wide w-[40px] min-w-[40px] max-w-[40px]">Per</th>
                                            ${teachers.map(t => `<th class="h-8 sticky top-0 z-20 bg-gray-100 border-b-2 border-r border-gray-300 text-[8.5px] font-semibold text-gray-500 px-0.5 truncate overflow-hidden min-w-[56px] w-[56px]" title="${escapeHtml(t.name)}">${escapeHtml(t.name.split(' ')[0])}</th>`).join('')}
                                        </tr>
                                    </thead>
                                    <tbody>
                        `;
                        [0,1,2,3,4,5].forEach(p => {
                            html += `<tr class="hover:bg-indigo-50 group">
                                <td class="sticky left-0 z-10 bg-white group-hover:bg-indigo-50 border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] p-1 text-center font-bold text-[10px] text-gray-800 ${p !== 5 ? 'border-b' : ''}">P${p+1}</td>`;
                            teachers.forEach((t, tIndex) => {
                                const isLastTeacher = tIndex === teachers.length - 1;
                                const cellData = t.schedule[p][d];
                                const styles = getCellStyles(cellData);
                                html += `<td class="p-0 align-middle overflow-hidden ${p !== 5 ? 'border-b border-gray-200' : ''} ${isLastTeacher ? 'border-r-2 border-r-gray-300' : 'border-r border-gray-200'}">
                                    <div draggable="true" ondragstart="handleDragStart(event, '${t.id}', ${p}, ${d})" ondragend="handleDragEnd(event)" ondragover="handleDragOver(event)" ondragenter="handleDragEnter(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${t.id}', ${p}, ${d})" onclick="startEdit(this, '${t.id}', ${p}, ${d}, true)" class="w-full h-full flex items-center justify-center transition-colors cursor-pointer ${styles} p-0.5 text-[8px] font-medium min-h-[32px] overflow-hidden" title="${cellData.text ? 'Click to edit: '+escapeHtml(cellData.text) : 'Click to add class'}">
                                        <span class="block w-full text-center truncate px-0.5">${escapeHtml(cellData.text) || ''}</span>
                                    </div>
                                </td>`;
                            });
                            html += `</tr>`;
                        });
                        html += `</tbody></table></div>`;
                    });
                    
                    html += `</div>`;
                    return html;
                }
            }
        }

        function updatePrintStyles() {
            let style = document.getElementById('dynamic-print-style');
            style.innerHTML = `
                @media print {
                    @page {
                        size: ${viewMode === 'master' ? 'tabloid landscape' : 'letter portrait'};
                        margin: ${viewMode === 'master' ? '0.25in' : '0.5in'};
                    }
                    body {
                        -webkit-print-color-adjust: exact;
                        print-color-adjust: exact;
                    }
                    th, td {
                        position: static !important;
                    }
                    .print-page-break {
                        page-break-before: always;
                        break-before: page;
                    }
                    .print-all-container {
                        display: none !important;
                    }
                    body.print-all-mode .print-all-container {
                        display: block !important;
                    }
                    body.print-all-mode .single-grid-container {
                        display: none !important;
                    }
                }
            `;
        }

        function renderApp() {
            document.getElementById('sidebar-container').innerHTML = getSidebarHtml();
            document.getElementById('main-container').innerHTML = getMainHtml();
            updatePrintStyles();

            const nameInput = document.getElementById('teacher-name-input');
            if (nameInput) {
                let nameSnapshot = "";
                nameInput.addEventListener('focus', () => {
                    nameSnapshot = JSON.stringify(teachers);
                });
                nameInput.addEventListener('input', (e) => {
                    getTeacher().name = e.target.value.toUpperCase();
                    document.getElementById('sidebar-container').innerHTML = getSidebarHtml();
                });
                nameInput.addEventListener('blur', () => {
                    if (nameSnapshot && nameSnapshot !== JSON.stringify(teachers)) {
                        undoStack.push(nameSnapshot);
                        if (undoStack.length > MAX_HISTORY) undoStack.shift();
                        saveData();
                        renderApp();
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    if (e.target.tagName === 'INPUT') return; 
                    e.preventDefault();
                    window.undo();
                }
            });
        });

    </script>
</body>
</html>
