<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Timetable Manager</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style id="dynamic-print-style"></style>
</head>
<body class="bg-gray-50 font-sans text-gray-800 print:bg-white print:h-auto overflow-hidden print:overflow-visible">

    <!-- App Container -->
    <div id="app" class="flex h-screen print:h-auto print:block">
        <!-- Sidebar and Main Area will be injected here by Javascript -->
        <div id="sidebar-container" class="w-64 bg-white border-r flex flex-col shadow-sm z-40 flex-shrink-0 print:hidden"></div>
        <div id="main-container" class="flex-1 flex flex-col overflow-hidden bg-gray-100 print:bg-white print:overflow-visible print:block"></div>
    </div>

    <script>
        // --- DATA & STATE ---
        const generateEmptyGrid = () => Array(6).fill(null).map(() => Array(6).fill(''));

        const initialTeachers = [
          { id: '1', name: 'CAREY', schedule: [['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ENVRIO 20/BIO 30', 'ADMIN'], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN'], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN'], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN'], ['ENVRIO 20/BIO 30', 'ENVRIO 20/BIO 30', 'ENVRIO 20/BIO 30', 'ENVRIO 20/BIO 30', 'ENVRIO 20/BIO 30', 'ENVRIO 20/BIO 30'], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN']] },
          { id: '2', name: 'HOULT', schedule: [['MATH 30', 'PREP', 'MATH 20', 'PREP', 'PREP', 'MATH 20'], ['MATH 20', 'MATH 30', 'MATH 30', 'MATH 20', 'MATH 20', 'MATH 20'], ['MATH 30', 'MATH 20', 'MATH 20/30', 'MATH 30', 'MATH 30', 'MATH 30'], ['CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP'], ['CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP'], ['CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP', 'CLASS COMP']] },

          { id: '4', name: 'HAYES C', schedule: [['PREP', 'SCIENCE 7/8', 'PREP', 'PHYS ED 9/10', 'SCIENCE 10/9', 'PREP'], ['SCIENCE 5/6', 'PHYS ED 5/6', 'SCIENCE 5/6', 'SCIENCE 5/6', 'PHYS ED 5/6', 'SCIENCE 5/6'], ['PAA 7-9', 'PHYS ED 9/10', 'ATH. DIR.', 'PHYS ED 5/6', 'PAA 7-9', 'PHYS ED 5/6'], ['PAA 10/20/30', 'SCIENCE 7/8', 'PAA 10/20/30', 'STEAM 7/8/9', 'PAA 10/20/30', 'SCIENCE 7/8'], ['SCIENCE 10/9', 'SCIENCE 10/9', 'SCIENCE 10/9', 'SCIENCE 10/9', 'SCIENCE 10/9', 'SCIENCE 10/9'], ['PHYS ED 20/30', 'PHYS ED 20/30', 'PHYS ED 9/10', 'PHYS ED 20/30', 'SCIENCE 7/8', 'PHYS ED 9/10']] },
          { id: '5', name: 'WILGOSH', schedule: [['STEAM DEV', 'HISTORY 20/30', 'MATH 7/8', 'HISTORY 20/30', 'SOCIAL9/HIST 10', 'ENGLISH 7/8'], ['MATH 7/8', 'MATH 7/8', 'PREP', 'MATH 7/8', 'MATH 7/8', 'MATH 7/8'], ['PREP', 'ENGLISH 7/8', 'ENGLISH 7/8', 'ENGLISH 7/8', 'PREP', 'SOCIAL 7/8'], ['ENGLISH 7/8', 'HISTORY 20/30', 'ENGLISH 7/8', 'STEAM 7/8/9', 'ENGLISH 7/8', 'HISTORY 20/30'], ['SOCIAL 9/HIST 10', 'SOCIAL 9/HIST 10', 'SOCIAL 9/HIST 10', 'SOCIAL 9/HIST 10', 'SOCIAL 9/HIST 10', 'SOCIAL 9/HIST 10'], ['SOCIAL 7/8', 'SOCIAL 7/8', 'HISTORY 20/30', 'SOCIAL 7/8', 'HISTORY 20/30', 'HISTORY 20/30']] },
          { id: '6', name: 'WHITELL', schedule: [['ART 7-9', 'MATH 9/10', 'MATH 9/10', 'PREP', 'PREP', 'MATH 9/10'], ['MATH 9/10', 'HEALTH 9', 'ART 7-9', 'MATH 9/10', 'MATH 9/10', 'MATH 9/10'], ['BAND 5/6', 'PREP/TRAVEL', 'BAND 5/6', 'PREP/TRAVEL', 'BAND 5/6', 'HEALTH 9'], ['BAND 9-12', '', 'BAND 9-12', '', 'BAND 9-12', ''], ['BAND 7/8', '', 'BAND 7/8', '', 'BAND 7/8', ''], ['MUSIC 3/4', '', 'MUSIC 3/4', '', 'MUSIC 3/4', '']] },
          { id: '7', name: 'BREDY', schedule: [['ENGLISH 5/6', 'ENGLISH 5/6', 'ENGLISH 5/6', 'ENGLISH 5/6', 'ENGLISH 5/6', 'ENGLISH 5/6'], ['STRUCT LIT 3/4', 'STRUCT LIT 3/4', 'STRUCT LIT 3/4', 'STRUCT LIT 3/4', 'STRUCT LIT 3/4', 'STRUCT LIT 3/4'], ['PAA 7-9', 'HEALTH 5/6', 'PREP', 'PREP', 'PAA 7-9', 'PREP'], ['PAA 10/20/30', 'ENGLISH 5/6', 'PAA 10/20/30', 'ENGLISH 5/6', 'PAA 10/20/30', 'ENGLISH 5/6'], ['MATH 5/6', 'MATH 5/6', 'MATH 5/6', 'MATH 5/6', 'MATH 5/6', 'MATH 5/6'], ['ENGLISH 5/6', 'ARTS ED 5/6', 'ENGLISH 5/6', 'ARTS ED 5/6', 'HEALTH 5/6', 'MATH 5/6']] },
          { id: '8', name: 'JEFFERY', schedule: [['MATH 3/4', 'MATH 3/4', 'MATH 3/4', 'MATH 3/4', 'MATH 3/4', 'MATH 3/4'], ['ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4'], ['PHYS ED 3/4', 'SCIENCE 3/4', 'PHYS ED 3/4', 'SCIENCE 3/4', 'PHYS ED 3/4', 'SCIENCE 3/4'], ['ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4', 'ENGLISH 3/4'], ['SOCIAL 3/4', 'SOCIAL 3/4', 'HEALTH 3/4', 'SOCIAL 3/4', 'SOCIAL 3/4', 'HEALTH 3/4'], ['PREP', 'ARTS ED 3/4', 'PREP', 'ARTS ED 3/4', 'PREP', 'MATH 3/4']] },
          { id: '9', name: 'TBD', schedule: [['MATH 1/2', 'MATH 1/2', 'MATH 1/2', 'MATH 1/2', 'MATH 1/2', 'MATH 1/2'], ['ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2'], ['HEALTH 1/2', 'SOCIAL 1/2', 'SOCIAL 1/2', 'HEALTH 1/2', 'SOCIAL 1/2', 'SOCIAL 1/2'], ['ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2', 'ENGLISH 1/2'], ['PREP', 'SCIENCE 1/2', 'PREP', 'SCIENCE 1/2', 'PREP', 'SCIENCE 1/2'], ['ARTS ED 1/2', 'ARTS ED 1/2', 'SCIENCE 1/2', 'ARTS ED 1/2', 'ARTS ED 1/2', 'ENGLISH 1/2']] },
          { id: '10', name: 'HYND', schedule: [['', 'KDGN', '', 'KDGN', '......', 'KDGN'], ['', 'KDGN', '', 'KDGN', '', 'KDGN'], ['', 'KDGN', '', 'KDGN', '', 'KDGN'], ['', '', '', '', '', ''], ['', 'KDGN', '', 'KDGN', '', 'KDGN'], ['', 'KDGN', '', 'KDGN', '', 'KDGN']] },
          { id: '11', name: 'BREWER', schedule: [['', '', '', 'CAREERS 7/8', '......', ''], ['', '', '', 'COUNSELLING', '', ''], ['', '......', '', 'CAREERS 9', '......', ''], ['', '', '', 'CWEX 10/20/30', '', ''], ['', '', '', 'COUNSELLING', '', ''], ['', '', '', 'COUNSELLING', '', '']] },
          { id: '12', name: 'RADIES-OLF', schedule: [['SDLC-GR 10', '', '', '', '', ''], ['', 'SCLC-GR 10S', 'SCLC-GR 10S', '', '', ''], ['SCLC-GR 10S', '', '', 'SCLC-GR 10S', 'SCLC-GR 10S', 'SCLC-GR 10S'], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '13', name: 'GYM PE', schedule: [['', '', '', 'PHYS ED 9/10', 'PHYS ED 7/8', ''], ['', 'PHYS ED 5/6', '', '', 'PHYS ED 5/6', ''], ['PHYS ED 3/4', 'PHYS ED 9/10', 'PHYS ED 3/4', 'PHYS ED 5/6', 'PHYS ED 3/4', 'PHYS ED 5/6'], ['', 'PHYS ED K', '', 'PHYS ED K', '', 'PHYS ED K'], ['PHYS ED 1/2', 'PHYS ED 7/8', 'PHYS ED 1/2', 'PHYS ED 7/8', 'PHYS ED 1/2', 'PHYS ED 7/8'], ['PHYS ED 20/30', 'PHYS ED 20/30', 'PHYS ED 9/10', 'PHYS ED 20/30', '', 'PHYS ED 9/10']] },
          { id: '14', name: 'KING', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN', 'ADMIN'], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '15', name: 'PALASCHAK', schedule: [['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', '', '', '', '', ''], ['', 'PHYS ED K', '', 'PHYS ED K', '', 'PHYS ED K'], ['', '', '', '', '', ''], ['', '', '', '', '', '']] },
          { id: '16', name: 'LIBRARY', schedule: generateEmptyGrid() },
          { id: '17', name: 'GREEN', schedule: generateEmptyGrid() },
          { id: '18', name: 'LAROCK', schedule: generateEmptyGrid() },
          { id: '19', name: 'NUNWEILER', schedule: generateEmptyGrid() }
        ];

        // Load from local storage, fallback to initial PDF data
        let teachers = JSON.parse(localStorage.getItem('masterTimetableData')) || initialTeachers;

        let selectedId = teachers[0].id;
        let viewMode = 'single'; // 'single' or 'master'

        function getTeacher() {
            return teachers.find(t => t.id === selectedId) || teachers[0];
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.toString().replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        // --- STYLING LOGIC ---
        function getCellStyles(value) {
            const v = (value || '').toUpperCase();
            if (v.includes('PREP')) return 'bg-gray-200 text-gray-700';
            if (v.includes('ADMIN')) return 'bg-blue-100 text-blue-800';
            if (v.includes('PHYS ED') || v.includes('GYM')) return 'bg-green-100 text-green-800';
            if (v.includes('SCIENCE') || v.includes('BIO')) return 'bg-purple-100 text-purple-800';
            if (v.includes('MATH')) return 'bg-red-100 text-red-800';
            if (v.includes('STEAM') || v.includes('PAA')) return 'bg-orange-100 text-orange-800';
            if (v.includes('BAND') || v.includes('MUSIC')) return 'bg-yellow-100 text-yellow-800';
            if (!v || v === 'FREE') return 'bg-white text-gray-300 italic';
            if (v.includes('......')) return 'bg-gray-50 text-gray-400';
            return 'bg-white text-gray-800';
        }

        // --- ACTIONS ---
        function saveData() {
            localStorage.setItem('masterTimetableData', JSON.stringify(teachers));
        }

        // --- UNDO ENGINE ---
        let undoStack = [];
        const MAX_HISTORY = 10;

        function saveStateToHistory() {
            undoStack.push(JSON.stringify(teachers));
            if (undoStack.length > MAX_HISTORY) {
                undoStack.shift();
            }
        }

        window.undo = function() {
            if (undoStack.length > 0) {
                const previousState = undoStack.pop();
                teachers = JSON.parse(previousState);
                saveData();
                renderApp();
            }
        };

        // --- DRAG AND DROP LOGIC ---
        let dragSource = null;

        window.handleDragStart = function(e, tId, p, d) {
            dragSource = { tId, p, d };
            e.dataTransfer.effectAllowed = 'copy';
            e.dataTransfer.setData('text/plain', 'timetable-cell');
            // Make the source tile slightly transparent while dragging
            e.target.style.opacity = '0.4'; 
        };

        window.handleDragEnd = function(e) {
            e.target.style.opacity = '1';
            dragSource = null;
        };

        window.handleDragOver = function(e) {
            e.preventDefault(); // Necessary to allow dropping
            e.dataTransfer.dropEffect = 'copy';
            return false;
        };

        window.handleDragEnter = function(e) {
            // Highlight the target cell so you know where it's dropping
            e.currentTarget.classList.add('ring-4', 'ring-indigo-400', 'scale-105', 'z-10');
        };

        window.handleDragLeave = function(e) {
            e.currentTarget.classList.remove('ring-4', 'ring-indigo-400', 'scale-105', 'z-10');
        };

        window.handleDrop = function(e, targetTId, targetP, targetD) {
            e.stopPropagation();
            e.currentTarget.classList.remove('ring-4', 'ring-indigo-400', 'scale-105', 'z-10');
            
            if (dragSource) {
                const sourceTeacher = teachers.find(t => t.id === dragSource.tId);
                const targetTeacher = teachers.find(t => t.id === targetTId);
                
                if (sourceTeacher && targetTeacher) {
                    const valToCopy = sourceTeacher.schedule[dragSource.p][dragSource.d];
                    if (targetTeacher.schedule[targetP][targetD] !== valToCopy) {
                        saveStateToHistory();
                        targetTeacher.schedule[targetP][targetD] = valToCopy;
                        saveData();
                        renderApp();
                    }
                }
            }
            return false;
        };

        window.switchView = function(mode) {
            viewMode = mode;
            renderApp();
        };

        window.selectTeacher = function(id) {
            selectedId = id;
            viewMode = 'single';
            renderApp();
        };

        window.addTeacher = function() {
            saveStateToHistory();
            const newId = Date.now().toString();
            teachers.push({ id: newId, name: 'NEW TEACHER', schedule: generateEmptyGrid() });
            selectedId = newId;
            viewMode = 'single';
            saveData();
            renderApp();
        };

        window.deleteTeacher = function() {
            if (teachers.length === 1) return alert("Cannot delete the last teacher.");
            if (confirm(`Are you sure you want to delete ${getTeacher().name}?`)) {
                saveStateToHistory();
                teachers = teachers.filter(t => t.id !== selectedId);
                selectedId = teachers[0].id;
                saveData();
                renderApp();
            }
        };

        window.exportData = function() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(teachers, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "master_timetable_backup.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        };

        window.triggerImport = function() {
            document.getElementById('fileImport').click();
        };

        window.handleImport = function(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        saveStateToHistory();
                        teachers = importedData;
                        selectedId = importedData[0]?.id || '';
                        saveData();
                        renderApp();
                    } else {
                        alert('Invalid file format. Please upload a valid backup JSON file.');
                    }
                } catch (err) {
                    alert('Error reading file. Please make sure it is a valid JSON backup.');
                }
                event.target.value = null; // reset input
            };
            reader.readAsText(file);
        };

        // --- INLINE EDITING LOGIC ---
        window.startEdit = function(element, tId, p, d, isCompact) {
            if (element.querySelector('input')) return; // Already editing
            
            const teacher = teachers.find(t => t.id === tId);
            const val = teacher.schedule[p][d] || '';
            const compactClasses = isCompact 
                ? 'p-0.5 text-[9px] min-w-[50px] border border-indigo-400' 
                : 'p-2 text-sm border-2 border-indigo-500 rounded';

            const input = document.createElement('input');
            input.type = 'text';
            input.value = val;
            input.className = `w-full h-full text-center outline-none focus:ring-2 focus:ring-indigo-300 ${compactClasses}`;
            
            input.onblur = function() {
                const newVal = this.value.toUpperCase();
                if (teacher.schedule[p][d] !== newVal) {
                    saveStateToHistory();
                    teacher.schedule[p][d] = newVal;
                    saveData();
                }
                renderApp();
            };
            input.onkeydown = function(e) {
                if(e.key === 'Enter') this.blur();
            };

            element.innerHTML = '';
            element.appendChild(input);
            input.focus();
        };


        // --- RENDERING VIEWS ---
        function getSidebarHtml() {
            let listHtml = teachers.map(t => {
                const isSelected = (selectedId === t.id && viewMode === 'single');
                const classes = isSelected 
                    ? 'bg-indigo-50 border-indigo-200 text-indigo-800 font-semibold shadow-sm' 
                    : 'bg-white border-transparent hover:bg-gray-100 text-gray-600';
                return `<div onclick="selectTeacher('${t.id}')" class="p-3 rounded-lg cursor-pointer transition-all duration-200 border ${classes}">${escapeHtml(t.name) || 'UNNAMED'}</div>`;
            }).join('');

            return `
                <div class="p-4 border-b bg-gray-50 flex flex-col gap-3">
                    <div class="flex items-center justify-between">
                        <h2 class="font-bold text-gray-700 tracking-wide uppercase text-sm">Timetable</h2>
                        <div class="flex items-center gap-1.5">
                            <button onclick="undo()" ${undoStack.length === 0 ? 'disabled' : ''} class="p-1.5 rounded transition-colors ${undoStack.length === 0 ? 'bg-gray-100 text-gray-300 cursor-not-allowed' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}" title="Undo (Ctrl+Z)">
                                <i class="fa-solid fa-rotate-left"></i>
                            </button>
                            <button onclick="addTeacher()" class="p-1.5 bg-indigo-100 text-indigo-700 rounded hover:bg-indigo-200 transition-colors" title="Add Teacher">
                                <i class="fa-solid fa-user-plus"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex bg-gray-200 p-1 rounded-md">
                        <button onclick="switchView('single')" class="flex-1 flex justify-center items-center gap-1.5 text-xs py-1.5 rounded-sm font-medium transition-colors ${viewMode === 'single' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'}">
                            <i class="fa-solid fa-user"></i> Individual
                        </button>
                        <button onclick="switchView('master')" class="flex-1 flex justify-center items-center gap-1.5 text-xs py-1.5 rounded-sm font-medium transition-colors ${viewMode === 'master' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500 hover:text-gray-700'}">
                            <i class="fa-solid fa-table-cells"></i> Master
                        </button>
                    </div>
                </div>
                
                <div class="flex-1 overflow-y-auto p-3 space-y-1">
                    ${listHtml}
                </div>

                <div class="p-4 border-t bg-gray-50 flex flex-col gap-2">
                    <input type="file" id="fileImport" accept=".json" onchange="handleImport(event)" class="hidden" />
                    <button onclick="triggerImport()" class="w-full flex items-center justify-center gap-2 py-2 px-4 bg-white border border-gray-300 rounded text-sm text-gray-700 hover:bg-gray-50 shadow-sm transition-colors">
                        <i class="fa-solid fa-upload"></i> Import Backup
                    </button>
                    <button onclick="exportData()" class="w-full flex items-center justify-center gap-2 py-2 px-4 bg-indigo-50 border border-indigo-200 rounded text-sm text-indigo-700 hover:bg-indigo-100 shadow-sm transition-colors">
                        <i class="fa-solid fa-download"></i> Export Backup
                    </button>
                </div>
            `;
        }

        function getSummaryHtml(teacher) {
            const counts = {};
            teacher.schedule.flat().forEach(val => {
                const cleanVal = (val || '').trim();
                if (cleanVal && cleanVal.toUpperCase() !== 'FREE' && cleanVal !== '......') {
                    counts[cleanVal] = (counts[cleanVal] || 0) + 1;
                }
            });
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            
            if (sorted.length === 0) return '';

            let html = `
                <div class="max-w-7xl mx-auto mt-8 bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden print:mt-6 print:shadow-none print:border-gray-300 print:border">
                    <div class="bg-gray-50 border-b px-6 py-3 font-semibold text-gray-700 text-sm uppercase tracking-wider print:bg-white print:border-b-2 print:border-gray-300">
                        Assignment Summary
                    </div>
                    <div class="p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 print:p-4 print:gap-2">
            `;
            
            sorted.forEach(([className, count]) => {
                html += `
                    <div class="flex justify-between items-center bg-gray-50 px-3 py-2 rounded border border-gray-200 print:bg-white print:border-gray-300">
                        <span class="text-sm font-medium text-gray-700 truncate mr-2" title="${escapeHtml(className)}">${escapeHtml(className)}</span>
                        <span class="text-sm font-bold text-indigo-700 bg-indigo-100 px-2.5 py-0.5 rounded-full print:bg-transparent print:text-gray-800 print:px-0 whitespace-nowrap">= ${count}</span>
                    </div>
                `;
            });
            
            html += `</div></div>`;
            return html;
        }

        function getMainHtml() {
            if (viewMode === 'single') {
                const t = getTeacher();
                
                // Toolbar
                let html = `
                    <div class="bg-white border-b px-8 py-5 flex items-center justify-between shadow-sm flex-shrink-0 print:border-none print:px-0 print:py-4">
                        <div class="flex items-center gap-4">
                            <input id="teacher-name-input" value="${escapeHtml(t.name)}" class="text-3xl font-extrabold text-gray-800 border-b-2 border-transparent hover:border-gray-300 focus:border-indigo-500 bg-transparent outline-none pb-1 uppercase w-[300px] print:p-0 print:border-none" placeholder="TEACHER NAME" />
                            <i class="fa-solid fa-pen text-gray-400 print:hidden text-lg"></i>
                        </div>
                        <div class="flex items-center gap-2 print:hidden">
                            <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 text-sm text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-md transition-colors font-medium">
                                <i class="fa-solid fa-print"></i> Print
                            </button>
                            <button onclick="deleteTeacher()" class="flex items-center gap-2 px-4 py-2 text-sm text-red-600 bg-red-50 hover:bg-red-100 rounded-md transition-colors font-medium">
                                <i class="fa-solid fa-trash-can"></i> Remove Staff
                            </button>
                        </div>
                    </div>
                `;

                // Single Grid
                html += `
                    <div class="flex-1 p-8 overflow-auto print:p-0 print:overflow-visible">
                        <div class="max-w-7xl mx-auto bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden print:shadow-none print:border-none print:overflow-visible">
                            <div class="grid grid-cols-7 border-b bg-gray-50 font-semibold text-gray-600 uppercase text-xs tracking-wider">
                                <div class="p-4 text-center border-r">Period</div>
                                ${[1, 2, 3, 4, 5, 6].map(day => `<div class="p-4 text-center border-r last:border-0">Day ${day}</div>`).join('')}
                            </div>
                            <div class="flex flex-col">
                `;

                for(let p=0; p<6; p++) {
                    html += `
                        <div class="grid grid-cols-7 border-b last:border-0">
                            <div class="p-4 text-center border-r bg-gray-50 flex flex-col items-center justify-center gap-1 font-bold text-gray-700">Period ${p + 1}</div>
                    `;
                    for(let d=0; d<6; d++) {
                        const val = t.schedule[p][d];
                        const styles = getCellStyles(val);
                        html += `
                            <div class="p-2 border-r last:border-0 bg-white hover:bg-gray-50 transition-colors flex items-center justify-center">
                                <div draggable="true" ondragstart="handleDragStart(event, '${t.id}', ${p}, ${d})" ondragend="handleDragEnd(event)" ondragover="handleDragOver(event)" ondragenter="handleDragEnter(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${t.id}', ${p}, ${d})" onclick="startEdit(this, '${t.id}', ${p}, ${d}, false)" class="w-full h-full flex items-center justify-center transition-colors cursor-pointer ${styles} p-2 text-sm rounded border border-gray-200 shadow-sm min-h-[60px] font-medium" title="${val ? 'Click to edit: '+escapeHtml(val) : 'Click to add class'}">
                                    <span>${escapeHtml(val) || 'Free'}</span>
                                </div>
                            </div>
                        `;
                    }
                    html += `</div>`;
                }

                html += `
                            </div>
                        </div>
                        <p class="text-center text-gray-400 mt-6 text-sm print:hidden">Click on any class cell to edit. Saves automatically on blur or Enter.</p>
                        ${getSummaryHtml(t)}
                    </div>
                `;
                return html;

            } else {
                // MASTER VIEW
                let html = `
                    <div class="bg-white border-b px-8 py-5 flex items-center justify-between shadow-sm flex-shrink-0 print:hidden">
                        <div>
                            <h1 class="text-2xl font-extrabold text-gray-800 uppercase tracking-tight">Master Grid</h1>
                            <p class="text-sm text-gray-500">Showing all ${teachers.length} staff across the 6-day cycle</p>
                        </div>
                        <button onclick="window.print()" class="flex items-center gap-2 px-4 py-2 text-sm text-indigo-600 bg-indigo-50 hover:bg-indigo-100 rounded-md transition-colors font-medium print:hidden">
                            <i class="fa-solid fa-print"></i> Print Master
                        </button>
                    </div>

                    <div class="flex-1 overflow-auto bg-gray-200 p-4 print:hidden">
                        <div class="bg-white border border-gray-300 shadow-sm w-max min-w-full inline-block align-top">
                            <table class="border-collapse min-w-full">
                                <thead>
                                    <tr>
                                        <th class="h-8 sticky top-0 left-0 z-30 bg-gray-100 border-b border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] p-1 min-w-[120px]"></th>
                                        ${[1,2,3,4,5,6].map(day => `<th colspan="6" class="h-8 sticky top-0 z-20 bg-gray-200 border-b border-r border-gray-300 text-[11px] uppercase tracking-wider text-center font-bold text-gray-700">Day ${day}</th>`).join('')}
                                    </tr>
                                    <tr>
                                        <th class="h-6 sticky top-8 left-0 z-30 bg-gray-50 border-b-2 border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] p-1 text-[10px] text-left px-2 font-bold text-gray-600 uppercase tracking-wide">Staff Name</th>
                                        ${[0,1,2,3,4,5].map(d => [0,1,2,3,4,5].map(p => `<th class="h-6 sticky top-8 z-20 bg-gray-100 border-b-2 border-r border-gray-300 text-[9px] font-semibold text-gray-500 w-[56px] min-w-[56px] max-w-[56px]">P${p+1}</th>`).join('')).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                `;

                teachers.forEach((t, rowIndex) => {
                    const isLast = rowIndex === teachers.length - 1;
                    html += `<tr class="hover:bg-indigo-50 group">
                        <td class="sticky left-0 z-10 bg-white group-hover:bg-indigo-50 border-r border-gray-300 shadow-[2px_0_5px_-2px_rgba(0,0,0,0.1)] p-1.5 px-2 font-bold text-[10px] text-gray-800 ${!isLast ? 'border-b' : ''}">${escapeHtml(t.name)}</td>`;
                    
                    for(let d=0; d<6; d++) {
                        for(let p=0; p<6; p++) {
                            const val = t.schedule[p][d];
                            const styles = getCellStyles(val);
                            html += `<td class="p-0 align-middle ${!isLast ? 'border-b border-gray-200' : ''} ${p === 5 ? 'border-r-2 border-r-gray-300' : 'border-r border-gray-200'}">
                                <div draggable="true" ondragstart="handleDragStart(event, '${t.id}', ${p}, ${d})" ondragend="handleDragEnd(event)" ondragover="handleDragOver(event)" ondragenter="handleDragEnter(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, '${t.id}', ${p}, ${d})" onclick="startEdit(this, '${t.id}', ${p}, ${d}, true)" class="w-full h-full flex items-center justify-center transition-colors cursor-pointer ${styles} p-1 text-[9px] font-medium min-h-[32px] overflow-hidden whitespace-nowrap" title="${val ? 'Click to edit: '+escapeHtml(val) : 'Click to add class'}">
                                    <span class="block w-[48px] truncate">${escapeHtml(val) || ''}</span>
                                </div>
                            </td>`;
                        }
                    }
                    html += `</tr>`;
                });

                html += `</tbody></table></div></div>`;

                // --- PRINT ONLY LAYOUT (Splits into 2 pages) ---
                let printHtml = `<div class="hidden print:block w-full p-0 bg-white">`;
                const chunks = [ [0,1,2], [3,4,5] ]; // Split into Days 1-3, and Days 4-6
                
                chunks.forEach((chunk, index) => {
                    // Force a page break for the second chunk
                    const pageBreak = index > 0 ? 'page-break-before: always; break-before: page;' : '';
                    printHtml += `
                        <div style="${pageBreak}" class="w-full">
                            <div class="mb-4 flex items-center justify-between">
                                <div>
                                    <h1 class="text-2xl font-extrabold text-gray-800 uppercase tracking-tight">Master Grid (Days ${chunk[0]+1}-${chunk[2]+1})</h1>
                                    <p class="text-sm text-gray-500">Showing all ${teachers.length} staff</p>
                                </div>
                            </div>
                            <table class="border-collapse w-full mb-8">
                                <thead>
                                    <tr>
                                        <th class="h-8 bg-gray-100 border-b border-r border-gray-300 p-1 w-[120px]"></th>
                                        ${chunk.map(dIndex => `<th colspan="6" class="h-8 bg-gray-200 border-b border-r border-gray-300 text-[11px] uppercase tracking-wider text-center font-bold text-gray-700">Day ${dIndex+1}</th>`).join('')}
                                    </tr>
                                    <tr>
                                        <th class="h-6 bg-gray-50 border-b-2 border-r border-gray-300 p-1 text-[10px] text-left px-2 font-bold text-gray-600 uppercase tracking-wide">Staff Name</th>
                                        ${chunk.map(dIndex => [0,1,2,3,4,5].map(p => `<th class="h-6 bg-gray-100 border-b-2 border-r border-gray-300 text-[9px] font-semibold text-gray-500 min-w-[56px] w-[56px]">P${p+1}</th>`).join('')).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                    `;

                    teachers.forEach((t, rowIndex) => {
                        const isLast = rowIndex === teachers.length - 1;
                        printHtml += `<tr>
                            <td class="bg-white border-r border-gray-300 p-1.5 px-2 font-bold text-[10px] text-gray-800 ${!isLast ? 'border-b border-gray-200' : ''}">${escapeHtml(t.name)}</td>`;
                        
                        chunk.forEach(d => {
                            for(let p=0; p<6; p++) {
                                const val = t.schedule[p][d];
                                const styles = getCellStyles(val);
                                printHtml += `<td class="p-0 align-middle ${!isLast ? 'border-b border-gray-200' : ''} ${p === 5 ? 'border-r-2 border-r-gray-300' : 'border-r border-gray-200'}">
                                    <div class="w-full h-full flex items-center justify-center ${styles} p-1 text-[9px] font-medium min-h-[32px] overflow-hidden whitespace-nowrap">
                                        <span class="block w-[48px] truncate">${escapeHtml(val) || ''}</span>
                                    </div>
                                </td>`;
                            }
                        });
                        printHtml += `</tr>`;
                    });

                    printHtml += `</tbody></table></div>`;
                });
                printHtml += `</div>`;

                return html + printHtml;
            }
        }

        function updatePrintStyles() {
            let style = document.getElementById('dynamic-print-style');
            style.innerHTML = `
                @media print {
                    @page {
                        size: ${viewMode === 'master' ? 'tabloid landscape' : 'letter portrait'};
                        margin: ${viewMode === 'master' ? '0.25in' : '0.5in'};
                    }
                    body {
                        -webkit-print-color-adjust: exact;
                        print-color-adjust: exact;
                    }
                    th, td {
                        position: static !important;
                    }
                }
            `;
        }

        // --- CORE RENDER ENGINE ---
        function renderApp() {
            document.getElementById('sidebar-container').innerHTML = getSidebarHtml();
            document.getElementById('main-container').innerHTML = getMainHtml();
            updatePrintStyles();

            // Re-attach listener to Name Input to avoid losing focus if user is typing
            const nameInput = document.getElementById('teacher-name-input');
            if (nameInput) {
                let nameSnapshot = "";
                nameInput.addEventListener('focus', () => {
                    nameSnapshot = JSON.stringify(teachers);
                });
                nameInput.addEventListener('input', (e) => {
                    getTeacher().name = e.target.value.toUpperCase();
                    // Only update the sidebar to reflect the new name, keeping focus in the input
                    document.getElementById('sidebar-container').innerHTML = getSidebarHtml();
                });
                nameInput.addEventListener('blur', () => {
                    if (nameSnapshot && nameSnapshot !== JSON.stringify(teachers)) {
                        undoStack.push(nameSnapshot);
                        if (undoStack.length > MAX_HISTORY) undoStack.shift();
                        saveData();
                        renderApp();
                    }
                });
            }
        }

        // Initialize the app on page load
        document.addEventListener('DOMContentLoaded', () => {
            renderApp();
            
            // Add Ctrl+Z shortcut
            document.addEventListener('keydown', function(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
                    if (e.target.tagName === 'INPUT') return; // Let default text undo work
                    e.preventDefault();
                    window.undo();
                }
            });
        });

    </script>
</body>
</html>
